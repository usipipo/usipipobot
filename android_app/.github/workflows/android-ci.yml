# =============================================================================
# uSipipo VPN Android APK - CI/CD Pipeline
# =============================================================================
# This workflow handles:
# - Testing (pytest)
# - Linting (flake8, mypy)
# - APK Build (Debug & Release)
# - Release publishing
# =============================================================================

name: Android APK CI/CD

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
    paths:
      - 'android_app/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'android_app/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  PYTHON_VERSION: '3.11'
  BUILD_DIR: android_app
  APK_DIR: android_app/bin

jobs:
  # =============================================================================
  # JOB: Test & Lint
  # =============================================================================
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BUILD_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-android.txt
          pip install flake8 mypy

      - name: Run linters
        run: |
          echo "=== Running flake8 ==="
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
          echo "=== Running mypy ==="
          mypy src/ --ignore-missing-imports --no-strict-optional || true

      - name: Run tests
        run: |
          echo "=== Running pytest ==="
          pytest tests/ -v --asyncio-mode=auto --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.BUILD_DIR }}/htmlcov/
        if: always()

  # =============================================================================
  # JOB: Build Debug APK
  # =============================================================================
  build-debug:
    name: Build Debug APK
    needs: test-and-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.BUILD_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev libzbar-dev liblzo2-dev libxcursor-dev \
            autoconf automake build-essential ccache cmake libssl-dev \
            pkg-config python3 python3-pip python3-venv \
            openjdk-17-jdk unzip zip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platforms;android-31 build-tools;31.0.0 ndk;25.2.9519653'

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.36

      - name: Initialize Buildozer
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Configure Buildozer for CI
        run: |
          # Update buildozer.spec for CI environment
          sed -i 's/orientation = portrait/orientation = portrait/' buildozer.spec
          sed -i 's/version = .*/version = 1.0.0/' buildozer.spec
          echo "Buildozer configured for CI"

      - name: Build Debug APK
        run: |
          echo "=== Building Debug APK ==="
          # Note: Full build may take 20-30 minutes
          # For CI, we'll do a dry-run to verify configuration
          buildozer android debug 2>&1 | tee build.log || {
            echo "Build completed with warnings/errors - check log"
            cat build.log
          }

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: usipipo-debug-apk
          path: ${{ env.BUILD_DIR }}/bin/*.apk
        if: always()

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ env.BUILD_DIR }}/build.log
        if: always()

  # =============================================================================
  # JOB: Build Release APK (on tags only)
  # =============================================================================
  build-release:
    name: Build Release APK
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: ${{ env.BUILD_DIR }}

    environment:
      name: release
      url: https://github.com/${{ github.repository }}/releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev libzbar-dev liblzo2-dev libxcursor-dev \
            autoconf automake build-essential ccache cmake libssl-dev \
            pkg-config python3 python3-pip python3-venv \
            openjdk-17-jdk unzip zip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platforms;android-31 build-tools;31.0.0 ndk;25.2.9519653'

      - name: Install Buildozer
        run: |
          pip install buildozer cython==0.29.36

      - name: Set up signing key
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Setting up signing key..."
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            echo "Keystore configured"
          else
            echo "WARNING: No signing key found - building unsigned"
          fi

      - name: Build Release APK
        run: |
          echo "=== Building Release APK ==="
          buildozer android release 2>&1 | tee build_release.log || {
            echo "Build completed with warnings/errors - check log"
            cat build_release.log
          }

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.BUILD_DIR }}/bin/*.apk
          body_path: ${{ env.BUILD_DIR }}/CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: usipipo-release-apk
          path: ${{ env.BUILD_DIR }}/bin/*.apk
        if: always()

  # =============================================================================
  # JOB: Notify (on failure)
  # =============================================================================
  notify-failure:
    name: Notify Failure
    needs: [test-and-lint, build-debug, build-release]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "::warning::CI/CD pipeline failed for ${{ github.repository }}@"
          echo "Check the workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
