# =============================================================================
# uSipipo VPN - Release Automation
# =============================================================================
# This workflow handles:
# - Automatic changelog generation from commits
# - GitHub release creation
# - Release notification to Telegram
# =============================================================================

name: Release Automation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

env:
  PYTHON_VERSION: '3.13'

jobs:
  # =============================================================================
  # JOB: Generate Changelog
  # =============================================================================
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feature", "enhancement", "feat"]
                },
                {
                  "title": "## 🐛 Bug Fixes",
                  "labels": ["fix", "bug", "bugfix"]
                },
                {
                  "title": "## 📝 Documentation",
                  "labels": ["docs", "documentation"]
                },
                {
                  "title": "## 🔒 Security",
                  "labels": ["security"]
                },
                {
                  "title": "## 🧪 Tests",
                  "labels": ["test", "tests"]
                },
                {
                  "title": "## ⚙️ CI/CD",
                  "labels": ["ci", "cd", "github-actions"]
                },
                {
                  "title": "## 📦 Dependencies",
                  "labels": ["dependencies", "dep"]
                },
                {
                  "title": "## Other Changes",
                  "labels": []
                }
              ],
              "ignore_labels": [
                "chore",
                "skip-changelog"
              ],
              "template": "${{#CHANGELOG}}${{CHANGELOG}}${{/CHANGELOG}}",
              "pr_template": "- ${{TITLE}} (#${{NUMBER}}) by @${{AUTHOR}}",
              "empty_template": "- No changes"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: CHANGELOG.md
          content: ${{ steps.changelog.outputs.changelog }}

  # =============================================================================
  # JOB: Create GitHub Release
  # =============================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: generate-changelog
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: CHANGELOG.md

      - name: Get previous tag
        id: previous_tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed

            ${{ needs.generate-changelog.outputs.changelog }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.previous_tag.outputs.previous_tag }}...${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # JOB: Notify Telegram (Optional)
  # =============================================================================
  notify-telegram:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [generate-changelog, create-release]
    if: startsWith(github.ref, 'refs/tags/v') && vars.TELEGRAM_BOT_TOKEN != '' && vars.TELEGRAM_CHAT_ID != ''

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ vars.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 *New Release: v${{ needs.generate-changelog.outputs.version }}*

            ${{ needs.generate-changelog.outputs.changelog }}

            🔗 [View Release on GitHub](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.generate-changelog.outputs.version }})
          format: markdown
          disable_web_page_preview: false
