name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: usipipo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_test
          SECRET_KEY: test-secret-key-for-ci-testing-min-32-chars!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret-minimum-32-chars!!"
          PYTHONPATH: .
        run: |
          pytest -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy

      - name: Run Black
        run: black --check --diff .

      - name: Run isort
        run: isort --check-only --diff . --profile black

      - name: Run Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,env,.git,migrations/versions

      - name: Install dependencies for type checking
        env:
          SECRET_KEY: test-secret-key-for-ci-testing-min-32-chars!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
        run: |
          pip install -r requirements.txt

      - name: Run MyPy
        continue-on-error: true
        run: mypy . --config-file pyproject.toml

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
