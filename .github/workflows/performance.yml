# =============================================================================
# uSipipo VPN - Performance Testing
# =============================================================================
# This workflow runs performance benchmarks and load tests
# =============================================================================

name: Performance Testing

on:
  push:
    branches: [main, develop]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
      - 'tests/performance/**'
      - '.github/workflows/performance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of performance test'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - database
          - full

env:
  PYTHON_VERSION: '3.13'

jobs:
  # =============================================================================
  # JOB: API Performance Tests
  # =============================================================================
  api-performance:
    name: API Performance Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.test_type == 'api' || inputs.test_type == 'full') || github.event_name != 'workflow_dispatch' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: usipipo_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install pytest-benchmark locust

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_perf
          SECRET_KEY: test-secret-key-for-performance-testing!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret!!"
        run: |
          uv run alembic upgrade head

      - name: Run API benchmark tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_perf
          SECRET_KEY: test-secret-key-for-performance-testing!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret!!"
        run: |
          uv run pytest tests/performance/ -v \
            --benchmark-only \
            --benchmark-json=benchmark.json \
            --tb=short \
            || echo "Performance tests completed with benchmarks"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
        if: always()

      - name: Publish benchmark results
        run: |
          if [ -f benchmark.json ]; then
            echo "## Performance Benchmark Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat benchmark.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # =============================================================================
  # JOB: Database Performance Tests
  # =============================================================================
  database-performance:
    name: Database Performance Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.test_type == 'database' || inputs.test_type == 'full') || github.event_name != 'workflow_dispatch' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: usipipo_dbperf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --dev

      - name: Run database performance tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_dbperf
          SECRET_KEY: test-secret-key-for-performance-testing!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret!!"
        run: |
          uv run pytest tests/ -v \
            -k "performance or benchmark" \
            --benchmark-only \
            --tb=short \
            || echo "Database performance tests completed"

  # =============================================================================
  # JOB: Load Test with Locust (Optional)
  # =============================================================================
  load-test:
    name: Load Test
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_type == 'full' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: usipipo_load
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install locust

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_load
          SECRET_KEY: test-secret-key-for-load-testing!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret!!"
        run: |
          uv run alembic upgrade head

      - name: Start backend server
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_load
          SECRET_KEY: test-secret-key-for-load-testing!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "127.0.0.1"
          SERVER_IPV4: "127.0.0.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret!!"
        run: |
          uv run python main.py &
          sleep 10
          echo "Backend server started"

      - name: Run Locust load test
        run: |
          if [ -f tests/performance/locustfile.py ]; then
            locust \
              -f tests/performance/locustfile.py \
              --headless \
              --users 50 \
              --spawn-rate 10 \
              --run-time 60s \
              --host http://localhost:8000 \
              --html=load-test-report.html \
              || echo "Load test completed"
          else
            echo "No locustfile.py found - skipping load test"
          fi

      - name: Upload load test report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: load-test-report.html
        if: always()

  # =============================================================================
  # JOB: Performance Summary
  # =============================================================================
  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [api-performance, database-performance, load-test]
    if: always()

    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
        continue-on-error: true

      - name: Download load test report
        uses: actions/download-artifact@v8
        with:
          name: load-test-report
        continue-on-error: true

      - name: Create performance summary
        run: |
          echo "## Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| API Performance | ${{ needs.api-performance.result }} | [View Results](#) |" >> $GITHUB_STEP_SUMMARY
          echo "| Database Performance | ${{ needs.database-performance.result }} | [View Results](#) |" >> $GITHUB_STEP_SUMMARY
          echo "| Load Test | ${{ needs.load-test.result }} | [View Report](#) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Performance tests are informational. Results may vary based on CI runner load." >> $GITHUB_STEP_SUMMARY
