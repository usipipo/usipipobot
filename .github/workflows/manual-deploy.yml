# =============================================================================
# uSipipo VPN - Manual Deployment
# =============================================================================
# This workflow allows manual deployment to different environments
# =============================================================================

name: Manual Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy (e.g., v1.0.0 or main for latest)'
        required: true
        default: 'main'
        type: string
      run_tests:
        description: 'Run tests before deployment'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.13'

jobs:
  # =============================================================================
  # JOB: Pre-deployment Tests
  # =============================================================================
  pre-deployment-tests:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests == 'true' }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: usipipo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/usipipo_test
          SECRET_KEY: test-secret-key-for-ci-testing-min-32-chars!!
          TELEGRAM_TOKEN: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
          ADMIN_ID: "123456789"
          SERVER_IP: "192.168.1.1"
          SERVER_IPV4: "192.168.1.1"
          WG_PATH: "/tmp/wireguard"
          TRON_DEALER_WEBHOOK_SECRET: "test-tron-dealer-webhook-secret-minimum-32-chars!!"
          PYTHONPATH: .
        run: |
          pytest -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage.xml
        if: always()

  # =============================================================================
  # JOB: Deploy to Environment
  # =============================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [pre-deployment-tests]
    if: always() && (needs.pre-deployment-tests.result == 'success' || needs.pre-deployment-tests.result == 'skipped')

    environment:
      name: ${{ inputs.environment }}
      url: ${{ vars.APP_URL || 'https://github.com/${{ github.repository }}' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version != 'main' && inputs.version || 'main' }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          if [[ "${{ inputs.version }}" == v* ]]; then
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
            echo "IMAGE_TAG=${{ inputs.version }}" >> $GITHUB_ENV
          else
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            echo "IMAGE_TAG=main" >> $GITHUB_ENV
          fi

      - name: Deploy notification
        run: |
          echo "🚀 Deploying to ${{ inputs.environment }}"
          echo "📦 Version: ${{ inputs.version }}"
          echo "🐳 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "🔗 Commit: ${{ github.sha }}"

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY

      # =============================================================================
      # DEPLOYMENT METHODS (Choose one based on your infrastructure)
      # =============================================================================

      # Option 1: SSH Deployment (uncomment and configure)
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       cd /opt/usipipo
      #       docker compose pull
      #       docker compose up -d
      #       docker image prune -f

      # Option 2: Kubernetes Deployment (uncomment and configure)
      # - name: Deploy to Kubernetes
      #   uses: Azure/k8s-deploy@v5
      #   with:
      #     manifests: |
      #       k8s/deployment.yaml
      #     images: |
      #       ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      #     kubectl-version: 'latest'
      #     kubernetes-service-endpoint: ${{ secrets.K8S_ENDPOINT }}
      #     token: ${{ secrets.K8S_TOKEN }}

      # Option 3: Docker Swarm Deployment (uncomment and configure)
      # - name: Deploy to Docker Swarm
      #   uses: appleboy/ssh-action@master
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       docker service update \
      #         --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
      #         --force usipipo_bot

      - name: Health check
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 30
          echo "✅ Deployment completed successfully!"

  # =============================================================================
  # JOB: Post-deployment Notification
  # =============================================================================
  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send deployment notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment to ${{ inputs.environment }} completed successfully!"
          else
            echo "❌ Deployment to ${{ inputs.environment }} failed!"
            echo "Check the workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
