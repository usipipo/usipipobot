name: "CodeQL"

on:
  push:
    branches: ["main"]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
      - 'requirements*.txt'
      - 'pyproject.toml'
  pull_request:
    branches: ["main"]
    paths:
      - 'domain/**'
      - 'application/**'
      - 'infrastructure/**'
      - 'telegram_bot/**'
      - 'miniapp/**'
      - 'utils/**'
      - 'config.py'
      - 'main.py'
      - 'requirements*.txt'
      - 'pyproject.toml'
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
