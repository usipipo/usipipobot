<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>uSipipo VPN - Cargando...</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js?59"></script>
    
    <style>
        :root {
            --bg-void: #0a0a0f;
            --bg-surface: #12121a;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff00aa;
            --text-primary: #e0e0e0;
            --text-secondary: #8a8a9a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-void);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .loader {
            text-align: center;
            max-width: 320px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { 
                opacity: 1;
                transform: scale(1);
            }
            50% { 
                opacity: 0.7;
                transform: scale(1.05);
            }
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .message {
            font-size: 14px;
            color: var(--text-secondary);
            transition: opacity 0.3s ease;
        }
        
        .error-box {
            background: rgba(255, 0, 170, 0.1);
            border: 1px solid var(--neon-magenta);
            border-radius: 8px;
            padding: 16px;
            margin-top: 20px;
            display: none;
            text-align: left;
        }
        
        .error-box.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .error-box.info {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-title {
            color: var(--neon-magenta);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .error-box.info .error-title {
            color: var(--neon-cyan);
        }
        
        .error-message {
            font-size: 12px;
            color: var(--text-primary);
            opacity: 0.8;
            line-height: 1.5;
        }
        
        .btn-primary {
            display: inline-block;
            background: var(--neon-cyan);
            color: var(--bg-void);
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-top: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .debug-info {
            margin-top: 30px;
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.5;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo">🔐</div>
        <div class="spinner" id="spinner"></div>
        <div class="title">uSipipo VPN</div>
        <div class="message" id="message">Inicializando Mini App...</div>
        
        <div class="error-box" id="errorBox">
            <div class="error-title">⚠️ Error de Autenticación</div>
            <div class="error-message" id="errorMessage"></div>
        </div>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>
    
    <script>
        (function() {
            'use strict';
            
            const tg = window.Telegram?.WebApp;
            const errorBox = document.getElementById('errorBox');
            const errorMessage = document.getElementById('errorMessage');
            const messageDiv = document.getElementById('message');
            const spinner = document.getElementById('spinner');
            const debugInfo = document.getElementById('debugInfo');
            
            function showError(msg, debug) {
                errorBox.classList.add('show');
                errorMessage.textContent = msg;
                spinner.style.display = 'none';
                if (debug) {
                    debugInfo.textContent = debug;
                }
            }
            
            function showDebug(msg) {
                debugInfo.textContent = msg;
            }
            
            if (!tg) {
                showError(
                    'Esta aplicación solo funciona dentro de Telegram. Por favor, abre la Mini App desde el bot de Telegram.',
                    'SDK de Telegram no detectado. Window.Telegram no está disponible.'
                );
                return;
            }
            
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#0a0a0f');
            tg.setBackgroundColor('#0a0a0f');
            tg.enableClosingConfirmation();
            
            showDebug('Platform: ' + tg.platform + ' | Version: ' + tg.version);
            
            messageDiv.textContent = 'Verificando autenticación...';

            setTimeout(async function() {
                try {
                    const initData = tg.initData;

                    showDebug('Platform: ' + tg.platform + ' | initData: ' + (initData ? 'presente (' + initData.length + ' chars)' : 'vacío'));

                    if (!initData || initData.length === 0) {
                        showError(
                            'No se pudieron obtener los datos de autenticación. Por favor, cierra y vuelve a abrir la Mini App desde Telegram.',
                            'initData está vacío o no disponible. Intenta recargar la página.'
                        );
                        return;
                    }

                    messageDiv.textContent = 'Verificando registro...';

                    // First, verify user is registered by checking the API
                    try {
                        const response = await fetch('/miniapp/api/user', {
                            headers: {
                                'X-Telegram-Init-Data': initData
                            }
                        });

                        if (response.status === 403) {
                            // User not registered - show message to start bot first
                            const errorData = await response.json();
                            if (errorData.detail === 'USER_NOT_REGISTERED') {
                                errorBox.classList.add('info');
                                errorBox.classList.add('show');
                                errorBox.querySelector('.error-title').textContent = '🤖 ¡Bienvenido!';
                                errorMessage.innerHTML =
                                    'Para usar la Mini App, primero debes iniciar el bot.<br><br>' +
                                    '1. Abre el bot @{{ bot_username }}<br>' +
                                    '2. Presiona /start<br>' +
                                    '3. Vuelve aquí y recarga la página';
                                spinner.style.display = 'none';
                                messageDiv.textContent = 'Registro necesario';
                                return;
                            }
                        }

                        if (!response.ok) {
                            throw new Error('API Error: ' + response.status);
                        }

                        // User is registered, proceed to dashboard
                        messageDiv.textContent = 'Redirigiendo al dashboard...';

                        const dashboardUrl = new URL('/miniapp/', window.location.origin);
                        dashboardUrl.searchParams.set('tgWebAppData', initData);

                        showDebug('Redirecting to: /miniapp/?tgWebAppData=...');

                        setTimeout(function() {
                            window.location.replace(dashboardUrl.toString());
                        }, 300);

                    } catch (fetchError) {
                        // If API check fails, try redirect anyway (backward compatibility)
                        messageDiv.textContent = 'Redirigiendo al dashboard...';

                        const dashboardUrl = new URL('/miniapp/', window.location.origin);
                        dashboardUrl.searchParams.set('tgWebAppData', initData);

                        setTimeout(function() {
                            window.location.replace(dashboardUrl.toString());
                        }, 300);
                    }

                } catch (e) {
                    showError(
                        'Error inesperado durante la autenticación. Por favor, intenta de nuevo.',
                        'Exception: ' + e.message
                    );
                }
            }, 500);
        })();
    </script>
</body>
</html>
